<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日语学习助手 | Japanese Learning Hub</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', 'Noto Sans JP', system-ui, -apple-system, sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-flip { perspective: 1000px; }
    .card-flip-inner { transition: transform 0.5s; transform-style: preserve-3d; }
    .card-flip-inner.flipped { transform: rotateY(180deg); }
    .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-back { transform: rotateY(180deg); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .md-body { font-size: 0.8rem; color: #4b5563; line-height: 1.6; font-family: 'Noto Sans JP', 'Segoe UI', system-ui, sans-serif; }
    .md-body h1,.md-body h2,.md-body h3 { font-weight: 700; margin: 0.6em 0 0.3em; color: #1f2937; }
    .md-body h1 { font-size: 1.1em; } .md-body h2 { font-size: 1em; } .md-body h3 { font-size: 0.9em; }
    .md-body p { margin: 0.3em 0; }
    .md-body ul,.md-body ol { padding-left: 1.2em; margin: 0.3em 0; }
    .md-body li { margin: 0.1em 0; }
    .md-body strong { font-weight: 700; color: #1f2937; }
    .md-body code { background: #f1f5f9; border-radius: 3px; padding: 0.1em 0.3em; font-size: 0.85em; }
    .md-body pre { background: #f1f5f9; border-radius: 8px; padding: 0.6em 0.8em; overflow-x: auto; margin: 0.4em 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 0.4em 0; font-size: 0.8rem; }
    .md-body th,.md-body td { border: 1px solid #e2e8f0; padding: 0.3em 0.6em; text-align: left; }
    .md-body th { background: #f8fafc; font-weight: 600; color: #374151; }
    .md-body tr:nth-child(even) td { background: #fafafa; }
    /* 闪卡复习页用的大字号 markdown 渲染（继承 md-body，覆盖字号/对齐） */
    .md-body-card { font-size: 1.5rem; line-height: 1.5; color: #1f2937; text-align: center; }
    .md-body-card h1,.md-body-card h2,.md-body-card h3 { text-align: center; }
    .md-body-card h1 { font-size: 1.75rem; }
    .md-body-card h2 { font-size: 1.5rem; }
    .md-body-card h3 { font-size: 1.25rem; }
    .md-body-card p { margin: 0.4em 0; font-size: 1.5rem; }
    .md-body-card ul,.md-body-card ol { text-align: left; display: inline-block; margin: 0.4em auto; font-size: 1.25rem; }
    .md-body-card li { font-size: 1.25rem; }
    .md-body-card strong { color: #111827; font-weight: 700; }
    .md-body-card code { font-size: 0.9em; background: #f1f5f9; }
    .md-body-card table { font-size: 1rem; text-align: left; margin: 0.4em auto; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// Load all source files, concatenate, then transform with Babel ONCE.
// Loading them as separate <script type="text/babel" src> causes:
//   1. Helper identifier collisions (`_excluded` redeclared) since Babel
//      transpiles each file independently and injects helpers each time.
//   2. Each file runs in its own transform pass, so failures cascade.
// One transform pass = one set of helpers + shared scope for cross-file refs.
(async () => {
  const FILES = [
    'src/shared/core.js',
    'src/shared/components.js',
    'src/shared/helpers.js',
    'src/shared/tts.js',
    'src/shared/auth.js',
    'src/modules/Dashboard.js',
    'src/modules/KnowledgeBase.js',
    'src/modules/Flashcards.js',
    'src/modules/Homework.js',
    'src/modules/Questions.js',
    'src/modules/Resources.js',
    'src/modules/PdfImport.js',
    'src/modules/Settings.js',
    'src/modules/AiPractice.js',
    'src/app.js',
  ];
  try {
    const sources = await Promise.all(
      FILES.map(f => fetch(f + '?v=' + Date.now()).then(r => {
        if (!r.ok) throw new Error(f + ' → ' + r.status);
        return r.text();
      }))
    );
    const combined = sources.map((s, i) => `\n//# sourceURL=${FILES[i]}\n${s}`).join('\n');
    const { code } = Babel.transform(combined, { presets: ['react'] });
    new Function(code)();
  } catch (e) {
    document.getElementById('root').innerHTML =
      '<div style="padding:2rem;font-family:system-ui;color:#b91c1c">' +
      '<h2>加载失败</h2><pre>' + (e.stack || e.message) + '</pre></div>';
    console.error(e);
  }
})();
</script>
</body></html>
